[build]
builder = "NIXPACKS"
buildCommand = "pip install -r requirements.txt && (test -f data/restaurants.parquet || python -m src.data.loader --ingest)"

[deploy]
startCommand = "uvicorn src.api.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
